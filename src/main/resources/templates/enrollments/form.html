<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="${enrollment.id != null ? 'Edit Enrollment' : 'Enroll Student'}">Enrollment Form</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/enrollments}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0" th:text="${enrollment.id != null ? 'Edit Enrollment' : 'Enroll Student'}"></h2>
    </div>

    <div class="card shadow-sm" style="max-width: 540px;">
        <div class="card-body">

            <div th:if="${enrollment.id == null}">
                <form th:action="@{/enrollments}" th:object="${enrollment}" method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Student</label>
                            <select th:field="*{studentId}" class="form-select"
                                    th:classappend="${#fields.hasErrors('studentId')} ? 'is-invalid'">
                                <option value="">-- Select Student --</option>
                                <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.fullName}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{studentId}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Course</label>
                            <select th:field="*{courseId}" class="form-select"
                                    th:classappend="${#fields.hasErrors('courseId')} ? 'is-invalid'">
                                <option value="">-- Select Course --</option>
                                <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.name + ' (' + c.dayOfWeek + ')'}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{courseId}"></div>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Enroll</button>
                        <a th:href="@{/enrollments}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>

            <div th:if="${enrollment.id != null}">
                <p class="mb-1"><strong>Student:</strong> <span th:text="${studentName}"></span></p>
                <p class="mb-3"><strong>Course:</strong> <span th:text="${courseName}"></span></p>
                <form th:action="@{/enrollments/{id}/grade(id=${enrollment.id})}" th:object="${enrollment}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Grade (0–10)</label>
                            <input type="number" th:field="*{grade}" class="form-control" step="0.01" min="0" max="10"
                                   th:classappend="${#fields.hasErrors('grade')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{grade}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select th:field="*{status}" class="form-select">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a th:href="@{/enrollments}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
</body>
</html>
