<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Enrollments</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Enrollments</h2>
        <a th:href="@{/enrollments/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Enroll Student
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Student</th>
                        <th>Course</th>
                        <th>Enrolled At</th>
                        <th>Grade</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${enrollments.empty}">
                        <td colspan="6" class="text-center text-muted py-3">No enrollments yet.</td>
                    </tr>
                    <tr th:each="e : ${enrollments}">
                        <td th:text="${e.student.fullName}"></td>
                        <td th:text="${e.course.name}"></td>
                        <td th:text="${#temporals.format(e.enrolledAt, 'MMM d, yyyy')}"></td>
                        <td th:text="${e.grade != null ? e.grade : '—'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${e.status.name() == 'ENROLLED'} ? 'bg-success' : (${e.status.name() == 'COMPLETED'} ? 'bg-primary' : 'bg-secondary')"
                                  th:text="${e.status}"></span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/attendance/enrollment/{id}(id=${e.id})}" class="btn btn-sm btn-outline-secondary me-1" title="Attendance">
                                <i class="bi bi-calendar-check"></i>
                            </a>
                            <a th:href="@{/enrollments/{id}/edit(id=${e.id})}" class="btn btn-sm btn-outline-primary me-1" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:if="${e.status.name() == 'ENROLLED'}"
                                  th:action="@{/enrollments/{id}/drop(id=${e.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Drop this enrollment?')">
                                <button type="submit" class="btn btn-sm btn-outline-warning" title="Drop">
                                    <i class="bi bi-x-circle"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
