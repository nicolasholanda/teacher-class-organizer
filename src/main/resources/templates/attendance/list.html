<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Attendance</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center gap-2 mb-1">
        <a th:href="@{/enrollments}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0">Attendance</h2>
    </div>
    <p class="text-muted mb-4">
        <strong th:text="${enrollment.student.fullName}"></strong> —
        <span th:text="${enrollment.course.name}"></span>
    </p>

    <div class="row g-3 mb-4">
        <div class="col-auto">
            <div class="card shadow-sm">
                <div class="card-body py-2 px-4 text-center">
                    <div class="text-muted small">Attendance Rate</div>
                    <div class="fs-4 fw-bold"
                         th:text="${#numbers.formatDecimal(attendanceRate, 1, 1)} + '%'">0%</div>
                </div>
            </div>
        </div>
        <div class="col-auto d-flex align-items-center">
            <a th:href="@{/attendance/enrollment/{id}/new(id=${enrollment.id})}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Record Attendance
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${attendances.empty}">
                        <td colspan="3" class="text-center text-muted py-3">No attendance records yet.</td>
                    </tr>
                    <tr th:each="a : ${attendances}">
                        <td th:text="${#temporals.format(a.attendanceDate, 'MMM d, yyyy')}"></td>
                        <td>
                            <span th:if="${a.present}" class="badge bg-success">Present</span>
                            <span th:unless="${a.present}" class="badge bg-danger">Absent</span>
                        </td>
                        <td class="text-end">
                            <form th:action="@{/attendance/{id}/delete(id=${a.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this record?')">
                                <input type="hidden" name="enrollmentId" th:value="${enrollment.id}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
