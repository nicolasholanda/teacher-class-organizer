<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Students</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Students</h2>
        <a th:href="@{/students/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>New Student
        </a>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body py-2">
            <form th:action="@{/students}" method="get" class="d-flex gap-2">
                <input type="text" name="search" class="form-control" placeholder="Search by name…"
                       th:value="${search}">
                <button class="btn btn-outline-secondary" type="submit">
                    <i class="bi bi-search"></i>
                </button>
                <a th:href="@{/students}" class="btn btn-outline-secondary" th:if="${search}">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Date of Birth</th>
                        <th>Phone</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${students.empty}">
                        <td colspan="5" class="text-center text-muted py-3">No students found.</td>
                    </tr>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.fullName}"></td>
                        <td th:text="${s.email}"></td>
                        <td th:text="${s.dateOfBirth != null ? #temporals.format(s.dateOfBirth, 'MMM d, yyyy') : '—'}"></td>
                        <td th:text="${s.phone ?: '—'}"></td>
                        <td class="text-end">
                            <a th:href="@{/students/{id}/edit(id=${s.id})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/students/{id}/delete(id=${s.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this student?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
