<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Courses</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Courses</h2>
        <a th:href="@{/courses/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>New Course
        </a>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body py-2">
            <form th:action="@{/courses}" method="get" class="d-flex gap-2">
                <input type="text" name="search" class="form-control" placeholder="Search courses…"
                       th:value="${search}">
                <button class="btn btn-outline-secondary" type="submit">
                    <i class="bi bi-search"></i>
                </button>
                <a th:href="@{/courses}" class="btn btn-outline-secondary" th:if="${search}">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Day</th>
                        <th>Time</th>
                        <th>Room</th>
                        <th>Capacity</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${courses.empty}">
                        <td colspan="6" class="text-center text-muted py-3">No courses found.</td>
                    </tr>
                    <tr th:each="c : ${courses}">
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.dayOfWeek}"></td>
                        <td th:text="${#temporals.format(c.startTime, 'HH:mm')} + ' – ' + ${#temporals.format(c.endTime, 'HH:mm')}"></td>
                        <td th:text="${c.room ?: '—'}"></td>
                        <td>
                            <span th:text="${c.activeEnrollmentCount} + ' / ' + ${c.maxStudents}"></span>
                            <span th:if="${!c.hasAvailableSpots()}" class="badge bg-danger ms-1">Full</span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/courses/{id}/edit(id=${c.id})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/courses/{id}/delete(id=${c.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this course?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
