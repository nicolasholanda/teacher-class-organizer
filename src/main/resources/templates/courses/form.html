<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="${course.id != null ? 'Edit Course' : 'New Course'}">Course Form</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/courses}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0" th:text="${course.id != null ? 'Edit Course' : 'New Course'}"></h2>
    </div>

    <div class="card shadow-sm" style="max-width: 640px;">
        <div class="card-body">
            <form th:action="${course.id != null ? '/courses/' + course.id : '/courses'}"
                  th:object="${course}" method="post">

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Course Name</label>
                        <input type="text" th:field="*{name}" class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{name}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"
                                  th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                        <div class="invalid-feedback" th:errors="*{description}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Day of Week</label>
                        <select th:field="*{dayOfWeek}" class="form-select"
                                th:classappend="${#fields.hasErrors('dayOfWeek')} ? 'is-invalid'">
                            <option value="">-- Select --</option>
                            <option th:each="d : ${daysOfWeek}" th:value="${d}" th:text="${d}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{dayOfWeek}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Start Time</label>
                        <input type="time" th:field="*{startTime}" class="form-control"
                               th:classappend="${#fields.hasErrors('startTime')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{startTime}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">End Time</label>
                        <input type="time" th:field="*{endTime}" class="form-control"
                               th:classappend="${#fields.hasErrors('endTime')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{endTime}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Room</label>
                        <input type="text" th:field="*{room}" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Max Students</label>
                        <input type="number" th:field="*{maxStudents}" class="form-control" min="1"
                               th:classappend="${#fields.hasErrors('maxStudents')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{maxStudents}"></div>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="@{/courses}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
